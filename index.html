<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VM-tips 2026 - Tipstävling</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, rgba(10,46,31,0.95) 0%, rgba(26,71,53,0.95) 100%);
            color: #1e2a3a;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #0a2e1f, #1a4735);
            padding: 1rem;
            text-align: center;
            border-bottom: 3px solid #FFD700;
            cursor: pointer;
        }
        .header h1 { color: #FFD700; font-size: 1.8rem; }
        .admin-login-popup {
            position: fixed;
            top: 70px;
            right: 20px;
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .btn-primary { background: #1a4d3e; color: white; }
        .btn-primary:hover { background: #0f3a2e; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-info:hover { background: #2563eb; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .player-bar {
            background: rgba(255,255,255,0.9);
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .player-bar select {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            border: 1px solid #ccc;
            min-width: 150px;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1rem;
        }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        .left-sidebar { display: flex; flex-direction: column; gap: 1rem; }
        .content-area {
            background: rgba(255,255,255,0.95);
            border-radius: 1rem;
            padding: 1rem;
        }
        .total-goals-section {
            background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
            border-radius: 0.8rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .total-goals-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a4d3e;
            background: white;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
        }
        .matches-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        .match-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .match-table th {
            background: #1a4d3e;
            color: white;
            padding: 0.5rem;
            text-align: left;
            position: sticky;
            top: 0;
        }
        .match-table td {
            padding: 0.4rem 0.5rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .tip-pending { color: #2563eb !important; font-weight: bold; }
        .tip-correct { color: #16a34a !important; font-weight: bold; }
        .tip-wrong { color: #dc2626 !important; font-weight: bold; }
        .no-tips { color: #999; font-style: italic; }
        .sidebar-card {
            background: rgba(255,255,255,0.95);
            border-radius: 1rem;
            padding: 0.8rem;
        }
        .sidebar-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #1a4d3e;
            margin-bottom: 0.5rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid #FFD700;
        }
        .player-list-item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
        }
        .player-list-item.active {
            background: #dcfce7;
            font-weight: bold;
        }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            color: #10b981;
            background: #f0fdf4;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
        }
        .live-dot {
            width: 5px;
            height: 5px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; }
        }
        .status-upcoming { color: #2563eb; }
        .status-played { color: #16a34a; }
        .top-player-item {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .embedded-badge {
            background: #FFD700;
            color: #0a2e1f;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: bold;
        }
        /* Admin result update panel */
        .admin-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }
        .admin-panel.active { display: block; }
        .admin-panel h3 {
            color: #1a4d3e;
            margin-bottom: 0.8rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid #FFD700;
        }
        .result-update-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .result-update-table th {
            background: #1a4d3e;
            color: white;
            padding: 0.4rem;
            text-align: left;
            position: sticky;
            top: 0;
        }
        .result-update-table td {
            padding: 0.3rem 0.4rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .result-select {
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
            font-size: 0.75rem;
            min-width: 80px;
        }
        .result-select option[value=""] { color: #999; }
        .result-select option[value="1"] { color: #2563eb; font-weight: bold; }
        .result-select option[value="X"] { color: #f59e0b; font-weight: bold; }
        .result-select option[value="2"] { color: #dc2626; font-weight: bold; }
        .save-results-btn {
            margin-top: 1rem;
            width: 100%;
        }
        .admin-bar-compact {
            background: rgba(255,255,255,0.9);
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .admin-bar-compact.active { display: flex; }
        /* Save status indicator */
        .save-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin-top: 0.5rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        .save-status.success {
            background: #dcfce7;
            color: #16a34a;
        }
        .save-status.error {
            background: #fee2e2;
            color: #dc2626;
        }
        .save-status.hidden {
            display: none;
        }
        .admin-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
    </style>
</head>

    <div class="header" id="mainHeader">
        <h1>🏆 VM-TIPS 2026 🏆</h1>
    </div>

    <div class="admin-login-popup" id="adminLoginPopup">

        </div>
        <div id="loginStatus" style="font-size:0.75rem; margin-top:0.5rem;"></div>

            <div id="saveStatus" class="save-status hidden"></div>

        <div class="player-bar">

        <div class="main-layout">

                </div>

        </div>

            if (saved) {
                actualResults = JSON.parse(saved);
            }
            updateUI();
        }

        function calculatePoints(playerData) {
            let total = 0;
            const tips = playerData.tips || {};
            allMatches.forEach((m, idx) => {
                const tip = tips[`match_${idx}`] || "";
                const actual = actualResults[idx];
                if (actual && tip.toLowerCase() === actual.toLowerCase()) total++;
            });
            return total;
        }

        function getTipClass(tip, matchId) {
            const actual = actualResults[matchId];
            if (!actual) return 'tip-pending';
            return tip.toLowerCase() === actual.toLowerCase() ? 'tip-correct' : 'tip-wrong';
        }

        function updateUI() {
            const selector = document.getElementById("publicPlayerSelector");
            const players = Object.keys(allPlayers);
            selector.innerHTML = '<option value="">-- Välj spelare --</option>' + players.map(p => `<option value="${p}" ${currentViewPlayer === p ? 'selected' : ''}>${p}</option>`).join('');

            const sidebar = document.getElementById("playersListSidebar");
            const points = players.map(p => ({ name: p, points: calculatePoints(allPlayers[p]) })).sort((a,b) => b.points - a.points);
            sidebar.innerHTML = points.map(p => `<div class="player-list-item ${currentViewPlayer === p.name ? 'active' : ''}" data-name="${p.name}"><span>${p.name}</span><span>${p.points} p</span></div>`).join('');
            document.querySelectorAll("#playersListSidebar .player-list-item").forEach(item => {
                item.onclick = () => { currentViewPlayer = item.dataset.name; updateUI(); };
            });

            const top5 = document.getElementById("topPlayersList");
            top5.innerHTML = points.slice(0,5).map((p,idx) => `<div class="top-player-item"><span>${idx+1}. ${p.name}</span><span>${p.points} p</span></div>`).join('');

            const totalGoals = document.getElementById("totalGoalsValue");
            if (currentViewPlayer && allPlayers[currentViewPlayer]?.totalGoals) {
                totalGoals.textContent = allPlayers[currentViewPlayer].totalGoals;
                document.getElementById("selectedPlayerInfo").textContent = `${currentViewPlayer} - ${calculatePoints(allPlayers[currentViewPlayer])} p`;
            } else {
                totalGoals.textContent = "-";
                document.getElementById("selectedPlayerInfo").textContent = "";
            }

            const container = document.getElementById("allMatchesContainer");
            const playerData = currentViewPlayer ? allPlayers[currentViewPlayer] : null;
            let html = `<table class="match-table"><thead><tr><th>#</th><th>Datum</th><th>Tid</th><th>Grupp</th><th>Lag 1</th><th></th><th>Lag 2</th><th>Tips</th><th>Status</th></tr></thead><tbody>`;
            allMatches.forEach(m => {
                const tip = playerData?.tips?.[`match_${m.id}`] || "";
                const tipClass = tip ? getTipClass(tip, m.id) : 'no-tips';
                const status = actualResults[m.id] ? `<span class="status-played">✅ ${actualResults[m.id].toUpperCase()}</span>` : '<span class="status-upcoming">⏳ Kommande</span>';
                html += `<tr><td>${m.matchNumber}</td><td>${m.datum}</td><td>${m.time}</td><td>${m.group}</td><td>${m.lag1}</td><td>vs</td><td>${m.lag2}</td><td class="${tipClass}">${tip ? tip.toUpperCase() : '-'}</td><td>${status}</td></tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // ===== ADMIN LOGIN =====
        function login() {
            const pwd = document.getElementById("adminPassword").value;
            if (pwd === ADMIN_PASSWORD) {
                isLoggedIn = true;
                document.getElementById("adminBarCompact").classList.add("active");
                document.getElementById("adminLoginPopup").style.display = "none";
                document.getElementById("loginStatus").textContent = "";
                document.getElementById("adminPassword").value = "";
                updateUI();
            } else {
                document.getElementById("loginStatus").textContent = "Fel lösenord!";
                document.getElementById("loginStatus").style.color = "#dc2626";
            }
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById("adminBarCompact").classList.remove("active");
            document.getElementById("adminPanel").classList.remove("active");
            updateUI();
        }

        // ===== RESULT UPDATE PANEL =====
        function toggleResultsPanel() {
            const panel = document.getElementById("adminPanel");
            if (panel.classList.contains("active")) {
                panel.classList.remove("active");
                return;
            }

            // Build the result update table
            const tbody = document.getElementById("resultUpdateBody");
            let html = '';
            allMatches.forEach(m => {
                const currentResult = actualResults[m.id] || "";
                html += `<tr>
                    <td>${m.matchNumber}</td>
                    <td>${m.datum}</td>
                    <td>${m.time}</td>
                    <td>${m.group}</td>
                    <td>${m.lag1}</td>
                    <td>vs</td>
                    <td>${m.lag2}</td>
                    <td>
                        <select class="result-select" data-match="${m.id}">
                            <option value="" ${currentResult === "" ? 'selected' : ''}>Kommande</option>
                            <option value="1" ${currentResult === "1" ? 'selected' : ''}>1</option>
                            <option value="X" ${currentResult === "X" || currentResult === "x" ? 'selected' : ''}>X</option>
                            <option value="2" ${currentResult === "2" ? 'selected' : ''}>2</option>
                        </select>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            panel.classList.add("active");
            hideSaveStatus();
        }

        function showSaveStatus(message, isSuccess) {
            const statusEl = document.getElementById("saveStatus");
            statusEl.textContent = message;
            statusEl.className = `save-status ${isSuccess ? 'success' : 'error'}`;
            statusEl.style.display = 'inline-flex';
            
            // Auto hide after 3 seconds
            setTimeout(() => hideSaveStatus(), 3000);
        }

        function hideSaveStatus() {
            const statusEl = document.getElementById("saveStatus");
            statusEl.className = 'save-status hidden';
            statusEl.style.display = 'none';
        }

        function saveResults(closePanel = false) {
            const selects = document.querySelectorAll(".result-select");
            let changed = 0;
            selects.forEach(sel => {
                const matchId = parseInt(sel.dataset.match);
                const val = sel.value;
                if (val === "") {
                    actualResults[matchId] = null;
                } else {
                    actualResults[matchId] = val.toLowerCase();
                    changed++;
                }
            });
            saveData();
            updateUI();
            
            if (changed > 0) {
                showSaveStatus(`✅ ${changed} resultat sparade!`, true);
            } else {
                showSaveStatus(`ℹ️ Inga ändringar att spara`, true);
            }
            
            if (closePanel) {
                setTimeout(() => {
                    document.getElementById("adminPanel").classList.remove("active");
                }, 1000);
            }
        }

        function cancelEdit() {
            document.getElementById("adminPanel").classList.remove("active");
            hideSaveStatus();
        }

        
        // ===== IMPORT EXCEL =====
        async function importExcelFile() {
            const file = document.getElementById("multiImport").files[0];
            if (!file) { 
                alert("Välj en fil först"); 
                return; 
            }

            const statusContainer = document.getElementById("importStatusContainer");
            statusContainer.innerHTML = '<div style="background: #f0fdf4; color: #059669; padding: 0.4rem; border-radius: 0.5rem; font-size: 0.75rem;">⏳ Läser fil...</div>';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    statusContainer.innerHTML = '<div style="background: #f0fdf4; color: #059669; padding: 0.4rem; border-radius: 0.5rem; font-size: 0.75rem;">✅ Alla 13 spelares tips är redan inbäddade i sidan. Ingen import nödvändig!</div>';
                    setTimeout(() => statusContainer.innerHTML = '', 5000);
                } catch(err) {
                    statusContainer.innerHTML = '<div style="background: #fee2e2; color: #dc2626; padding: 0.4rem; border-radius: 0.5rem; font-size: 0.75rem;">❌ Fel: ' + err.message + '</div>';
                }
            };
            reader.onerror = function() {
                statusContainer.innerHTML = '<div style="background: #fee2e2; color: #dc2626; padding: 0.4rem; border-radius: 0.5rem; font-size: 0.75rem;">❌ Fel vid läsning av fil</div>';
            };
            reader.readAsArrayBuffer(file);

            document.getElementById("multiImport").value = "";
            document.getElementById("selectedFilesCount").textContent = "Ingen fil vald";
        }

document.addEventListener("DOMContentLoaded", () => {
            loadData();

            // Header click → login popup
            let timer = null;
            document.getElementById("mainHeader").onclick = () => {
                if (isLoggedIn) return;
                const popup = document.getElementById("adminLoginPopup");
                if (popup.style.display === "block") {
                    popup.style.display = "none";
                    clearTimeout(timer);
                } else {
                    popup.style.display = "block";
                    timer = setTimeout(() => popup.style.display = "none", 30000);
                }
            };

            document.getElementById("loginBtn").onclick = login;
            document.getElementById("logoutBtn").onclick = logout;
            document.getElementById("toggleResultsBtn").onclick = toggleResultsPanel;
            document.getElementById("saveResultsBtn").onclick = () => saveResults(false);
            document.getElementById("saveAndCloseBtn").onclick = () => saveResults(true);
            document.getElementById("cancelBtn").onclick = cancelEdit;
            document.getElementById("multiImport").onchange = (e) => {
                const c = e.target.files.length;
                document.getElementById("selectedFilesCount").textContent = c === 0 ? "Ingen fil vald" : (c === 1 ? "1 fil vald" : c + " filer valda");
            };
            document.getElementById("importFilesBtn").onclick = importExcelFile;

            document.getElementById("publicPlayerSelector").onchange = (e) => {
                currentViewPlayer = e.target.value || null;
                updateUI();
            };
        });
    </script>
</body>
</html>
